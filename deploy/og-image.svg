<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0807"/>
      <stop offset="100%" style="stop-color:#130F0C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#C4975A"/>
  <!-- Ghost number -->
  <text x="920" y="560" font-family="Georgia, serif" font-size="520" font-weight="700" font-style="italic"
        fill="none" stroke="#1E1810" stroke-width="1">40</text>
  <!-- Main title -->
  <text x="80" y="310"
        font-family="Georgia, serif"
        font-size="160" font-weight="700" font-style="italic" letter-spacing="-4"
        fill="#EDE8DE">Whhite</text>
  <!-- Subtitle -->
  <text x="82" y="368"
        font-family="Arial, sans-serif"
        font-size="18" font-weight="600" letter-spacing="8"
        fill="#6B5F55">TOOLS &amp; EXPERIMENTS</text>
  <!-- Stats row -->
  <text x="82" y="460" font-family="Georgia, serif" font-size="52" font-weight="300" fill="#C4975A">40</text>
  <text x="82" y="482" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#6B5F55">PROJECTS</text>
  <line x1="168" y1="445" x2="168" y2="488" stroke="#2B2420" stroke-width="1"/>
  <text x="188" y="460" font-family="Georgia, serif" font-size="52" font-weight="300" fill="#C4975A">5</text>
  <text x="188" y="482" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#6B5F55">CATEGORIES</text>
  <!-- Domain -->
  <rect x="80" y="558" width="200" height="34" rx="4" fill="rgba(196,151,90,0.1)" stroke="rgba(196,151,90,0.25)" stroke-width="1"/>
  <text x="180" y="580" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#C4975A">whhite.whhite.com</text>
</svg>
