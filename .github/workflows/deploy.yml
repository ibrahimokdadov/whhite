name: Deploy to Dokku

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 69.30.223.194 >> ~/.ssh/known_hosts

      - name: Push deploy/ subtree to Dokku
        run: |
          git remote add dokku ssh://dokku@69.30.223.194/whhite
          git subtree push --prefix deploy dokku master
